name: saturation-adaptive
mode: adaptive
duration_s: 10
message_rate_hz: 500
message_size_bytes: 65536
peer_count: 2
network:
  delay_ms: 0
  jitter_ms: 0
  loss_pct: 0
threat_schedule:
  - at_s: 0
    value: 0.1
  - at_s: 3
    value: 0.95
  - at_s: 7
    value: 0.1
energy_schedule:
  - at_s: 0
    value: 0.9
  - at_s: 7
    value: 0.1
rekey_interval_s: 2
tags: ["saturation", "performance", "adaptive"]

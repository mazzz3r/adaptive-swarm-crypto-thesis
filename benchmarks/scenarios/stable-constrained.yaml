name: stable-constrained
mode: adaptive
duration_s: 20
message_rate_hz: 10
message_size_bytes: 512
peer_count: 2
network:
  delay_ms: 5
  jitter_ms: 1
  loss_pct: 0
resources:
  cpu_limit_cores: 0.5
  memory_limit_mb: 256
threat_schedule:
  - at_s: 0
    value: 0.2
energy_schedule:
  - at_s: 0
    value: 1.0
rekey_interval_s: 10
tags: ["generic", "stable", "constrained"]
